<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grave Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }

        /* КОНТЕЙНЕР 9:16 */
        #main-container {
            position: relative;
            width: 100vw; height: 177.78vw;
            max-height: 100vh; max-width: 56.25vh;
            background: #111; overflow: hidden;
        }

        /* ВИДЕО СЛОЙ */
        #loading-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; background: #000;
            display: flex; justify-content: center; align-items: center;
        }
        #loading-video { width: 100%; height: 100%; object-fit: cover; }

        /* КНОПКА ПЕРЕХОДА */
        #start-btn {
            position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
            padding: 15px 35px; background: #fff; color: #000;
            border: none; border-radius: 30px; font-weight: bold;
            font-family: sans-serif; font-size: 16px; cursor: pointer;
            z-index: 1001; display: none; /* Появится после видео */
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
        }

        /* ИГРОВОЙ СЛОЙ */
        #game-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: block; /* Изначально под видео */
        }
        #background { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        #user-profile {
            position: absolute; top: 52%; left: 28%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
        }
        #user-avatar { width: 65px; height: 65px; border: 2px solid #fff; background: #222; object-fit: cover; }
        #user-name {
            color: white; font-family: sans-serif; font-size: 13px; font-weight: bold; margin-top: 5px;
            text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.6); padding: 3px 8px;
        }

        #shovel-cursor {
            position: fixed; width: 100px; height: auto;
            pointer-events: none; z-index: 2000; transform: translate(-20%, -80%);
            display: none;
        }
        #info {
            position: absolute; top: 10px; left: 15px; color: #fff; font-family: monospace;
        }
    </style>
</head>
<body>

<div id="main-container">
    <div id="loading-layer">
        <video id="loading-video" muted playsinline webkit-playsinline autoplay preload="auto">
            <source src="zagryska.mp4" type="video/mp4">
        </video>
        <button id="start-btn" onclick="closeLoader()">ВОЙТИ В ИГРУ</button>
    </div>

    <div id="game-layer">
        <img id="background" src="фон.png">
        <div id="user-profile">
            <img id="user-avatar" src="">
            <span id="user-name">...</span>
        </div>
        <div id="info">Progress: <span id="percent">0</span>%</div>
    </div>
</div>

<audio id="dig-sound"><source src="dig.mp3" type="audio/mpeg"></audio>
<img id="shovel-cursor" src="lap1.png">

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const video = document.getElementById('loading-video');
    const startBtn = document.getElementById('start-btn');
    const loader = document.getElementById('loading-layer');
    const shovel = document.getElementById('shovel-cursor');
    const bg = document.getElementById('background');
    const digSound = document.getElementById('dig-sound');

    let progress = 0;
    let dir = 10;
    let active = false;

    // 1. УПРАВЛЕНИЕ ЗАГРУЗКОЙ
    function showBtn() {
        startBtn.style.display = 'block';
    }

    video.onended = showBtn;
    
    // Страховка: если видео не прогрузилось за 2 секунды - даем кнопку
    setTimeout(() => {
        if (startBtn.style.display !== 'block') showBtn();
    }, 2000);

    function closeLoader() {
        loader.style.display = 'none';
        active = true;
        init();
    }

    // 2. ЛОГИКА ИГРЫ
    function init() {
        const u = tg.initDataUnsafe?.user;
        if (u) {
            document.getElementById('user-name').innerText = u.first_name;
            document.getElementById('user-avatar').src = u.photo_url || `https://ui-avatars.com/api/?name=${u.first_name}`;
        }
        update();
    }

    function update() {
        document.getElementById('percent').innerText = progress;
        if (progress >= 100) bg.src = "100.png";
        else if (progress >= 60) bg.src = "60.png";
        else if (progress >= 40) bg.src = "40.png";
        else if (progress >= 20) bg.src = "20.png";
        else bg.src = "фон.png";
    }

    function dig() {
        if (!active) return;
        digSound.currentTime = 0;
        digSound.play().catch(()=>{});
        
        shovel.src = "lap2.png";
        setTimeout(() => shovel.src = "lap1.png", 150);

        if (progress >= 100) dir = -10;
        else if (progress <= 0) dir = 10;
        
        progress = Math.max(0, Math.min(100, progress + dir));
        update();
    }

    // КЛИКИ И ТАПЫ
    document.addEventListener('mousedown', dig);
    document.addEventListener('touchstart', (e) => {
        if (!active) return;
        const t = e.touches[0];
        shovel.style.display = 'block';
        shovel.style.left = t.clientX + 'px';
        shovel.style.top = t.clientY + 'px';
        dig();
    });

    document.addEventListener('mousemove', (e) => {
        if (!active) return;
        shovel.style.display = 'block';
        shovel.style.left = e.clientX + 'px';
        shovel.style.top = e.clientY + 'px';
    });

</script>
</body>
</html>
