<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grave Game Online</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif; -webkit-user-select: none; user-select: none;
        }
        .game-viewport {
            position: relative;
            width: 100vw; height: 177.78vw; 
            max-height: 100vh; max-width: 56.25vh;
            background: #000; overflow: hidden;
        }

        /* КНОПКИ И ЗАГРУЗКА */
        #entry-btn {
            position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%);
            padding: 18px 45px; background: #fff; color: #000;
            border: none; border-radius: 40px; font-weight: 900;
            font-size: 20px; cursor: pointer; z-index: 999;
            display: none; box-shadow: 0 0 30px rgba(255,255,255,0.6);
        }
        #home-btn {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #28a745; color: white;
            border: 2px solid #fff; border-radius: 40px; font-weight: bold;
            display: none; z-index: 2001; cursor: pointer;
        }
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500; background: #000;
        }
        #loading-video { width: 100%; height: 100%; object-fit: cover; }

        /* ИГРОВОЙ КОНТЕЙНЕР */
        #game-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 10;
        }
        #background { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        /* ФИКСИРОВАННЫЕ ОБЪЕКТЫ НА ТРАВЕ (Привязка к низу) */
        #placed-grave {
            position: absolute; 
            bottom: 45.5%; /* Линия травы */
            left: 20%; 
            transform: translateX(-50%); 
            width: 32%; 
            max-width: 350px;
            z-index: 45; 
            display: none; 
            pointer-events: none;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.7));
        }
        #placed-flag {
            position: absolute; 
            bottom: 45.5%; /* Та же линия, что у могилы */
            right: 20%; 
            transform: translateX(50%); 
            width: 18%; 
            max-width: 200px;
            z-index: 44; 
            display: none; 
            pointer-events: none;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* ПРОФИЛЬ (Привязка под травой) */
        #user-profile {
            position: absolute; 
            bottom: 35%; 
            left: 28%; 
            transform: translateX(-50%);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            z-index: 100;
        }
        #user-avatar { width: 65px; height: 65px; border: 2px solid #fff; background: #222; object-fit: cover; }
        #user-name {
            color: white; font-size: 13px; font-weight: bold; margin-top: 5px;
            background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 4px; text-align: center;
        }

        /* ИНТЕРФЕЙС */
        #shop-ui, #players-list-ui { position: absolute; right: 10px; display: none; flex-direction: column; align-items: flex-end; gap: 8px; z-index: 1001; }
        #shop-ui { top: 10px; }
        #players-list-ui { top: 120px; }
        .btn-open-shop { background: gold; color: black; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-open-players { background: #4a90e2; color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .balance { color: white; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; font-size: 14px; font-weight: bold; }

        /* МОДАЛКИ */
        #players-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 300px; background: rgba(20, 20, 20, 0.98); 
            border: 2px solid gold; border-radius: 15px; padding: 15px; 
            display: none; z-index: 3000; color: white;
        }
        #race-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); 
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 5000; color: white;
        }
        .race-options { display: flex; gap: 20px; margin-top: 20px; }
        .race-btn {
            background: #222; border: 2px solid #444; border-radius: 15px;
            padding: 15px; cursor: pointer; color: white; text-align: center; transition: 0.2s;
        }
        .race-btn:hover { border-color: gold; transform: scale(1.05); }
        .race-btn img { width: 100px; display: block; margin-bottom: 10px; border-radius: 5px; }

        /* КУРСОР И ИНФО */
        #shovel-cursor { position: fixed; width: 100px; height: auto; pointer-events: none; z-index: 30000; transform: translate(-20%, -80%); display: none; }
        #info { position: absolute; top: 15px; left: 15px; color: #fff; background: rgba(0,0,0,0.5); padding: 4px 8px; z-index: 50; font-family: monospace;}
        .bonus-text {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: gold; font-size: 40px; font-weight: bold; z-index: 5000;
            animation: fadeUp 1s forwards; text-shadow: 0 0 15px #000; pointer-events: none;
        }
        @keyframes fadeUp { 0% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -150%); } }
    </style>
</head>
<body>

<div class="game-viewport">
    <button id="entry-btn" onclick="startGame()">Почати гру</button>
    <button id="home-btn" onclick="goHome()">🏠 ПОВЕРНУТИСЬ ДОДОМУ</button>

    <div id="shop-ui">
        <button class="btn-open-shop" onclick="openShop()">МАГАЗИН</button>
        <div class="balance">💀 <span id="skulls-val">0</span></div>
    </div>

    <div id="players-list-ui">
        <button class="btn-open-players" onclick="togglePlayersModal(true)">ГРАВЦІ</button>
    </div>

    <div id="race-modal">
        <h2 style="color: gold; text-shadow: 0 0 10px gold;">ОБЕРИ СВІЙ ПРАПОР</h2>
        <div class="race-options">
            <div class="race-btn" onclick="selectRace('photo/flag1.png')">
                <img src="photo/flag1.png">
                <span>РАСА 1</span>
            </div>
            <div class="race-btn" onclick="selectRace('photo/flag2.png')">
                <img src="photo/flag2.png">
                <span>РАСА 2</span>
            </div>
        </div>
    </div>

    <div id="players-modal">
        <h3>Список гравців</h3>
        <div id="players-container" style="max-height: 250px; overflow-y: auto;"></div>
        <button onclick="togglePlayersModal(false)" style="width:100%; padding:10px; margin-top:10px; background:#cc3333; color:white; border:none; border-radius:8px; cursor: pointer;">ЗАКРИТИ</button>
    </div>

    <div id="loading-screen">
        <video id="loading-video" muted playsinline webkit-playsinline autoplay preload="auto">
            <source src="zagryska.mp4" type="video/mp4">
        </video>
    </div>

    <div id="game-container">
        <img id="placed-grave" src=""> 
        <img id="placed-flag" src=""> 
        <img id="background" src="photo/1.png"> 
        <div id="user-profile">
            <img id="user-avatar" src="">
            <span id="user-name">...</span>
        </div>
        <div id="info">Progress: <span id="percent">0</span>%</div>
    </div>
</div>

<audio id="dig-sound"><source src="dig.mp3" type="audio/mpeg"></audio>
<img id="shovel-cursor" src="photo/lap1.png">

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const loader = document.getElementById('loading-screen');
    const entryBtn = document.getElementById('entry-btn');
    const gameContainer = document.getElementById('game-container');
    const shovel = document.getElementById('shovel-cursor');
    const bg = document.getElementById('background');
    const pg = document.getElementById('placed-grave');
    const pf = document.getElementById('placed-flag');
    const homeBtn = document.getElementById('home-btn');
    const raceModal = document.getElementById('race-modal');

    let isPlaying = false;
    let isGuestMode = false;
    let lastClickTime = 0;

    let skulls = parseInt(localStorage.getItem('skulls')) || 0;
    let progress = 0;
    let step = 4;
    let dir = step;

    let shovelNormal = 'photo/lap1.png';
    let shovelHit = 'photo/lap2.png';

    // ДАННЫЕ ИГРОКОВ
    let defaultPlayers = [
        { name: "Andriy", id: "#8821", grave: "photo/g1.png", progress: 10 },
        { name: "Vika", id: "#4452", grave: "photo/g2.png", progress: 90 }
    ];
    let playersData = JSON.parse(localStorage.getItem('players_list_save')) || defaultPlayers;

    function openShop() {
        localStorage.setItem('isShopActive', 'true');
        window.location.href = 'magaz.html';
    }

    function updateGraveDisplay() {
        if (isGuestMode) return;
        const savedGrave = localStorage.getItem('selectedGrave');
        pg.src = (savedGrave && savedGrave !== "none") ? savedGrave : "";
        pg.style.display = pg.src.includes('photo/') ? 'block' : 'none';
        
        const savedFlag = localStorage.getItem('playerRaceFlag');
        pf.src = savedFlag || "";
        pf.style.display = savedFlag ? 'block' : 'none';
    }

    function startGame() {
        if (!localStorage.getItem('playerRaceFlag')) {
            loader.style.display = 'none';
            entryBtn.style.display = 'none';
            raceModal.style.display = 'flex';
        } else {
            finalizeStart();
        }
    }

    function selectRace(flagPath) {
        localStorage.setItem('playerRaceFlag', flagPath);
        raceModal.style.display = 'none';
        finalizeStart();
    }

    function finalizeStart() {
        loader.style.display = 'none';
        entryBtn.style.display = 'none';
        gameContainer.style.display = 'block';
        document.getElementById('shop-ui').style.display = 'flex';
        document.getElementById('players-list-ui').style.display = 'flex';
        isPlaying = true;

        if (localStorage.getItem('isShopActive') === 'true') {
            localStorage.removeItem('isShopActive');
            syncData();
        } else {
            goHome();
        }
    }

    function syncData() {
        isGuestMode = false;
        shovelNormal = localStorage.getItem('selectedShovelMain') || 'photo/lap1.png';
        shovelHit = localStorage.getItem('selectedShovelHit') || 'photo/lap2.png';
        shovel.src = shovelNormal;
        skulls = parseInt(localStorage.getItem('skulls')) || 0;
        progress = parseInt(localStorage.getItem('savedProgress')) || 0;
        initUser();
        updateGraveDisplay();
        updateArt();
    }

    function goHome() {
        homeBtn.style.display = 'none';
        syncData();
    }

    // МЕХАНИКА ЛОПАТЫ
    const moveShovel = (e) => {
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        if (x && y) {
            shovel.style.display = 'block';
            shovel.style.left = x + 'px';
            shovel.style.top = y + 'px';
        }
    };

    document.addEventListener('mousemove', moveShovel);
    document.addEventListener('touchmove', (e) => { if(e.cancelable) e.preventDefault(); moveShovel(e); }, {passive:false});
    document.addEventListener('touchstart', (e) => {
        if (e.target.closest('#shop-ui, #players-list-ui, #players-modal, #home-btn, #entry-btn, #race-modal')) return;
        moveShovel(e); if (isPlaying) doDig();
    });
    document.addEventListener('mousedown', (e) => {
        if (isPlaying && !e.target.closest('#shop-ui, #players-list-ui, #players-modal, #home-btn, #entry-btn, #race-modal')) doDig();
    });

    function doDig() {
        const now = Date.now();
        if (now - lastClickTime < 80) return;
        lastClickTime = now;
        shovel.src = shovelHit;
        const s = document.getElementById('dig-sound');
        if (s) { s.currentTime = 0; s.play().catch(()=>{}); }
        setTimeout(() => { shovel.src = shovelNormal; }, 120);

        let oldP = progress;
        if (progress >= 100) dir = -step;
        else if (progress <= 0) dir = step;
        progress = Math.max(0, Math.min(100, progress + dir));

        if (oldP < 100 && progress >= 100) {
            skulls += 25;
            showBonus("+25 💀");
            tg.HapticFeedback.notificationOccurred('success');
        }
        updateArt();
    }

    function updateArt() {
        document.getElementById('percent').innerText = progress;
        bg.src = `photo/${Math.min(8, Math.max(1, Math.floor(progress / 12.5) + 1))}.png`;
        document.getElementById('skulls-val').innerText = skulls;
        if (!isGuestMode) localStorage.setItem('savedProgress', progress);
        localStorage.setItem('skulls', skulls);
    }

    function initUser() {
        if (isGuestMode) return;
        const u = tg.initDataUnsafe?.user;
        document.getElementById('user-name').innerText = u ? u.first_name : "Гравець";
        document.getElementById('user-avatar').src = u ? (u.photo_url || `https://ui-avatars.com/api/?name=${u.first_name}`) : "https://ui-avatars.com/api/?name=P";
    }

    function togglePlayersModal(s) { 
        document.getElementById('players-modal').style.display = s ? 'block' : 'none'; 
        if(s) {
            const c = document.getElementById('players-container');
            c.innerHTML = "";
            playersData.forEach(p => {
                const d = document.createElement('div');
                d.style.cssText = "display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #333;cursor:pointer;";
                d.innerHTML = `<span>${p.name}</span><span>${p.progress}%</span>`;
                d.onclick = () => {
                    isGuestMode = true; progress = p.progress;
                    pg.src = p.grave; pg.style.display = 'block';
                    pf.style.display = 'none'; homeBtn.style.display = 'block';
                    document.getElementById('user-name').innerText = p.name;
                    document.getElementById('user-avatar').src = `https://ui-avatars.com/api/?name=${p.name}&background=random`;
                    togglePlayersModal(false); updateArt();
                };
                c.appendChild(d);
            });
        }
    }

    function showBonus(t) {
        const e = document.createElement('div'); e.className = 'bonus-text'; e.innerText = t;
        document.body.appendChild(e); setTimeout(() => e.remove(), 1000);
    }

    // МГНОВЕННЫЙ СТАРТ ИЗ МАГАЗИНА
    window.onload = () => { if (localStorage.getItem('isShopActive') === 'true') finalizeStart(); };
    document.getElementById('loading-video').onended = () => { if (!isPlaying) entryBtn.style.display = 'block'; };
    setTimeout(() => { if(loader.style.display !== 'none' && !isPlaying) entryBtn.style.display = 'block'; }, 4000);
</script>
</body>
</html>
