<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grave Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            cursor: none; -webkit-user-select: none; user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 177.78vw;
            max-height: 100vh; max-width: 56.25vh;
            overflow: hidden; touch-action: none;
        }

        #background {
            width: 100%; height: 100%;
            object-fit: cover; pointer-events: none;
        }

        /* ОБНОВЛЕННЫЙ БЛОК ПРОФИЛЯ (КВАДРАТНЫЙ И ЛЕВЕЕ) */
        #user-profile {
            position: absolute;
            top: 47%; /* Высота под камнем */
            left: 35%; /* Сместили левее (было 50%) */
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 100;
            pointer-events: none;
        }

        #user-avatar {
            width: 65px; /* Сделали больше */
            height: 65px; /* Сделали больше */
            border-radius: 8px; /* Легкое скругление углов, но форма - КВАДРАТ */
            border: 3px solid rgba(255, 255, 255, 0.8);
            background: #222;
            object-fit: cover;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        #user-name {
            color: white;
            font-family: sans-serif;
            font-size: 16px; /* Имя тоже чуть крупнее */
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
            background: rgba(0,0,0,0.5);
            padding: 3px 10px;
            border-radius: 4px;
            white-space: nowrap;
        }

        #shovel-cursor {
            position: fixed;
            width: 110px; height: auto;
            pointer-events: none; z-index: 9999;
            transform: translate(-20%, -80%) rotate(-10deg);
            display: none;
        }

        #info {
            position: absolute; top: 10px; right: 15px;
            color: rgba(255,255,255,0.7); font-family: monospace;
            background: rgba(0,0,0,0.5); padding: 4px 10px;
            border-radius: 5px; z-index: 20;
        }
    </style>
</head>
<body>

<img id="shovel-cursor" src="lap1.png" alt="shovel">

<div id="game-container">
    <img id="background" src="фон.png">
    
    <div id="user-profile">
        <img id="user-avatar" src="" alt="">
        <span id="user-name">Loading...</span>
    </div>

    <div id="info">Progress: <span id="percent">0</span>%</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    const avatarImg = document.getElementById('user-avatar');
    const nameSpan = document.getElementById('user-name');

    if (user) {
        nameSpan.innerText = user.first_name;
        // Загружаем фото профиля или заглушку
        avatarImg.src = user.photo_url || `https://ui-avatars.com/api/?name=${user.first_name}&background=random&color=fff&size=128`;
    } else {
        nameSpan.innerText = "Игрок";
        avatarImg.src = `https://ui-avatars.com/api/?name=P&background=333&color=fff&size=128`;
    }

    let progress = 0;
    let isDigging = true;
    const bg = document.getElementById('background');
    const shovel = document.getElementById('shovel-cursor');
    const percentText = document.getElementById('percent');

    function updateShovelPos(x, y) {
        shovel.style.display = 'block';
        shovel.style.left = x + 'px';
        shovel.style.top = y + 'px';
    }

    document.addEventListener('mousemove', (e) => updateShovelPos(e.clientX, e.clientY));
    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        updateShovelPos(touch.clientX, touch.clientY);
    }, { passive: false });

    const handleAction = () => {
        shovel.src = "lap2.png";
        setTimeout(() => { shovel.src = "lap1.png"; }, 400);

        if (isDigging) {
            progress += 10;
            if (progress >= 100) { progress = 100; isDigging = false; }
        } else {
            progress -= 10;
            if (progress <= 0) { progress = 0; isDigging = true; }
        }
        
        percentText.innerText = progress;
        updateBackground();
    };

    document.addEventListener('mousedown', handleAction);
    document.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        updateShovelPos(touch.clientX, touch.clientY);
        handleAction();
    });

    function updateBackground() {
        if (progress >= 100) bg.src = "100.png";
        else if (progress >= 60) bg.src = "60.png";
        else if (progress >= 40) bg.src = "40.png";
        else if (progress >= 20) bg.src = "20.png";
        else bg.src = "фон.png";
    }
</script>

</body>
</html>
