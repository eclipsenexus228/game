<style>
    /* Стили для того самого блока, который ты выделил */
    #user-profile {
        position: absolute;
        top: 20px; /* Отступ сверху */
        left: 20px; /* Отступ слева */
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.7); /* Темный полупрозрачный фон */
        padding: 8px 15px;
        border-radius: 50px; /* Скругление как на твоем скриншоте */
        z-index: 100;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    #user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #fff;
    }

    #user-name {
        font-size: 16px;
        font-weight: 600;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }
</style>

<div id="user-profile">
    <img id="user-avatar" src="" alt="">
    <span id="user-name">Загрузка...</span>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user;
    const avatarImg = document.getElementById('user-avatar');
    const nameSpan = document.getElementById('user-name');

    if (user) {
        // Если зашли через Telegram
        nameSpan.innerText = user.first_name;
        
        if (user.photo_url) {
            avatarImg.src = user.photo_url;
        } else {
            // Если фото нет, ставим красивую заглушку с буквой имени
            avatarImg.src = `https://ui-avatars.com/api/?name=${user.first_name}&background=666&color=fff`;
        }
    } else {
        // Если открыли просто в браузере (как на твоем скрине)
        nameSpan.innerText = "Игрок";
        avatarImg.src = "https://ui-avatars.com/api/?name=Player&background=333&color=fff";
    }
</script>
