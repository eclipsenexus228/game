<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grave Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            cursor: none; /* Скрываем обычную мышь */
            -webkit-user-select: none; user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 177.78vw;
            max-height: 100vh; max-width: 56.25vh;
            overflow: hidden; touch-action: none;
        }

        #background {
            width: 100%; height: 100%;
            object-fit: cover; pointer-events: none;
        }

        /* Тот самый блок профиля, который ты выделил */
        #user-profile {
            position: absolute;
            top: 15px; left: 15px;
            display: flex; align-items: center;
            gap: 10px; background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px; border-radius: 30px;
            z-index: 100; color: white;
            font-family: sans-serif; border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #user-avatar {
            width: 35px; height: 35px;
            border-radius: 50%; object-fit: cover;
            background: #444;
        }

        #user-name { font-size: 14px; font-weight: bold; }

        /* Кастомная лопата */
        #shovel-cursor {
            position: fixed;
            width: 100px; height: auto;
            pointer-events: none; z-index: 9999;
            transform: translate(-20%, -80%) rotate(-10deg);
            display: none; /* Покажется при движении */
        }

        #info {
            position: absolute; top: 65px; left: 15px;
            color: white; font-family: sans-serif;
            background: rgba(0,0,0,0.5); padding: 4px 8px;
            border-radius: 5px; z-index: 20;
        }
    </style>
</head>
<body>

<div id="user-profile">
    <img id="user-avatar" src="" alt="">
    <span id="user-name">Загрузка...</span>
</div>

<img id="shovel-cursor" src="lap1.png" id="shovel">

<div id="game-container">
    <img id="background" src="фон.png">
    <div id="info">Прогресс: <span id="percent">0</span>%</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Настройка профиля
    const user = tg.initDataUnsafe?.user;
    const avatarImg = document.getElementById('user-avatar');
    const nameSpan = document.getElementById('user-name');

    if (user) {
        nameSpan.innerText = user.first_name;
        avatarImg.src = user.photo_url || `https://ui-avatars.com/api/?name=${user.first_name}&background=random&color=fff`;
    } else {
        nameSpan.innerText = "Игрок";
        avatarImg.src = "https://ui-avatars.com/api/?name=P&background=333&color=fff";
    }

    // Настройка лопаты и игры
    let progress = 0;
    let isDigging = true;
    const bg = document.getElementById('background');
    const shovel = document.getElementById('shovel-cursor');
    const percentText = document.getElementById('percent');

    function moveShovel(x, y) {
        shovel.style.display = 'block';
        shovel.style.left = x + 'px';
        shovel.style.top = y + 'px';
    }

    document.addEventListener('mousemove', (e) => moveShovel(e.clientX, e.clientY));
    document.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        moveShovel(touch.clientX, touch.clientY);
    }, { passive: false });

    const handleAction = () => {
        // Смена картинки лопаты
        shovel.src = "lap2.png";
        setTimeout(() => { shovel.src = "lap1.png"; }, 500);

        // Логика копания
        if (isDigging) {
            progress += 10;
            if (progress >= 100) { progress = 100; isDigging = false; }
        } else {
            progress -= 10;
            if (progress <= 0) { progress = 0; isDigging = true; }
        }
        
        percentText.innerText = progress;
        updateUI();
    };

    document.addEventListener('mousedown', handleAction);
    document.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        moveShovel(touch.clientX, touch.clientY);
        handleAction();
    });

    function updateUI() {
        if (progress >= 100) bg.src = "100.png";
        else if (progress >= 60) bg.src = "60.png";
        else if (progress >= 40) bg.src = "40.png";
        else if (progress >= 20) bg.src = "20.png";
        else bg.src = "фон.png";
    }
</script>

</body>
</html>
