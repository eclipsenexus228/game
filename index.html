<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grave Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }

        .game-viewport {
            position: relative;
            width: 100vw; height: 177.78vw; 
            max-height: 100vh; max-width: 56.25vh;
            background: #111; overflow: hidden;
        }

        /* ЭКРАН ЗАГРУЗКИ */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; background: #000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease; /* Плавное исчезновение */
        }
        #loading-video { width: 100%; height: 100%; object-fit: cover; }

        /* ИГРА */
        #game-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: block; /* Она всегда там, под видео */
        }

        #background { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        #user-profile {
            position: absolute; top: 52%; left: 28%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
        }
        #user-avatar { width: 65px; height: 65px; border: 2px solid #fff; background: #222; object-fit: cover; }
        #user-name {
            color: white; font-family: sans-serif; font-size: 13px; font-weight: bold; margin-top: 5px;
            text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.6); padding: 3px 8px;
        }

        #shovel-cursor {
            position: fixed; width: 100px; height: auto;
            pointer-events: none; z-index: 30000; transform: translate(-20%, -80%);
            display: none;
        }
        #info {
            position: absolute; top: 10px; left: 15px; color: #fff; font-family: monospace; z-index: 10;
        }
    </style>
</head>
<body onclick="forceStart()"> <div class="game-viewport">
    <div id="loading-screen">
        <video id="loading-video" muted playsinline webkit-playsinline autoplay preload="auto">
            <source src="zagryska.mp4" type="video/mp4">
        </video>
    </div>

    <div id="game-container">
        <img id="background" src="photo/1.png">
        <div id="user-profile">
            <img id="user-avatar" src="">
            <span id="user-name">...</span>
        </div>
        <div id="info">Progress: <span id="percent">0</span>%</div>
    </div>
</div>

<audio id="dig-sound"><source src="dig.mp3" type="audio/mpeg"></audio>
<img id="shovel-cursor" src="lap1.png">

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const video = document.getElementById('loading-video');
    const loader = document.getElementById('loading-screen');
    const shovel = document.getElementById('shovel-cursor');
    const bg = document.getElementById('background');
    const digSound = document.getElementById('dig-sound');

    let progress = 0;
    let step = 2; 
    let dir = step; 
    let isPlaying = false;

    // --- ФУНКЦИЯ ВХОДА ---
    function launchGame() {
        if (isPlaying) return;
        isPlaying = true;
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 500);
        initUser();
    }

    // События видео
    video.onended = launchGame;
    video.onerror = launchGame;

    // Страховка №1: Если видео идет, следим за временем
    video.ontimeupdate = function() {
        if (video.duration > 0 && video.currentTime >= video.duration - 0.2) {
            launchGame();
        }
    };

    // Страховка №2: Если всё зависло на 5 секунд
    setTimeout(launchGame, 5000);

    // Страховка №3: Если пользователь сам тапнул по черному экрану
    function forceStart() {
        if (!isPlaying) launchGame();
    }

    // --- ЛОГИКА ИГРЫ ---
    function initUser() {
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
            document.getElementById('user-avatar').src = user.photo_url || `https://ui-avatars.com/api/?name=${user.first_name}`;
        }
        updateArt();
    }

    function updateArt() {
        document.getElementById('percent').innerText = progress;
        let n = 1;
        if (progress >= 100) n = 8;
        else if (progress >= 85) n = 7;
        else if (progress >= 70) n = 6;
        else if (progress >= 55) n = 5;
        else if (progress >= 40) n = 4;
        else if (progress >= 25) n = 3;
        else if (progress >= 10) n = 2;
        else n = 1;
        bg.src = `photo/${n}.png`;
    }

    function doDig() {
        if (!isPlaying) return;
        digSound.currentTime = 0;
        digSound.play().catch(()=>{});
        shovel.src = "lap2.png";
        setTimeout(() => { shovel.src = "lap1.png"; }, 150);
        if (progress >= 100) dir = -step;
        else if (progress <= 0) dir = step;
        progress = Math.max(0, Math.min(100, progress + dir));
        updateArt();
    }

    document.addEventListener('mousedown', (e) => { if (isPlaying) doDig(); });
    document.addEventListener('touchstart', (e) => {
        if (!isPlaying) return;
        const t = e.touches[0];
        shovel.style.display = 'block';
        shovel.style.left = t.clientX + 'px';
        shovel.style.top = t.clientY + 'px';
        doDig();
    });
    document.addEventListener('mousemove', (e) => {
        if (!isPlaying) return;
        shovel.style.display = 'block';
        shovel.style.left = e.clientX + 'px';
        shovel.style.top = e.clientY + 'px';
    });

</script>
</body>
</html>
